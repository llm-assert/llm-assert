name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run rpc-audit

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: "placeholder"
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "pk_test_placeholder"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
        run: pnpm run build

  pkg-exports:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build plugin package
        run: pnpm --filter @llmassert/playwright build
      - name: Validate types (attw)
        run: pnpm --filter @llmassert/playwright exec attw --pack . --profile node16
      - name: Validate exports map (publint)
        run: pnpm --filter @llmassert/playwright exec publint --strict
      - name: Validate runtime imports (ESM + CJS)
        working-directory: packages/playwright
        run: node scripts/check-exports.mjs
      - name: Validate type declarations (tsc)
        run: pnpm --filter @llmassert/playwright exec tsc -p scripts/tsconfig.check-exports.json

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run tests
        env:
          LLMASSERT_API_KEY: ""
          LLMASSERT_INGEST_URL: ""
        run: pnpm test
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: test-results
          path: |
            packages/playwright/test-results/
            apps/dashboard/coverage/
          retention-days: 7

  verify-stripe:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Verify Stripe products and prices
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY_LIVE }}
          STRIPE_STARTER_PRICE_ID: ${{ secrets.STRIPE_STARTER_PRICE_ID }}
          STRIPE_PRO_PRICE_ID: ${{ secrets.STRIPE_PRO_PRICE_ID }}
          STRIPE_TEAM_PRICE_ID: ${{ secrets.STRIPE_TEAM_PRICE_ID }}
        run: pnpm exec tsx scripts/stripe-verify.ts

  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Install Supabase CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/supabase/cli/main/install.sh | sh

      - name: Start Supabase
        run: supabase start
        working-directory: .

      - name: Wait for Supabase health
        run: |
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:54321/rest/v1/ -H "apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0" && break || sleep 2
          done

      - name: Extract Supabase keys
        id: supabase-keys
        run: |
          STATUS=$(supabase status --output json 2>/dev/null || supabase status 2>&1)
          ANON_KEY=$(echo "$STATUS" | grep -oP 'anon key: \K.*' || echo "$STATUS" | python3 -c "import sys,json; print(json.load(sys.stdin).get('ANON_KEY',''))" 2>/dev/null)
          SERVICE_ROLE_KEY=$(echo "$STATUS" | grep -oP 'service_role key: \K.*' || echo "$STATUS" | python3 -c "import sys,json; print(json.load(sys.stdin).get('SERVICE_ROLE_KEY',''))" 2>/dev/null)
          echo "anon_key=$ANON_KEY" >> "$GITHUB_OUTPUT"
          echo "service_role_key=$SERVICE_ROLE_KEY" >> "$GITHUB_OUTPUT"

      - name: Build plugin package
        run: pnpm --filter @llmassert/playwright build

      # Next.js is started automatically by Playwright's webServer config
      # (playwright.integration.config.ts) which waits for localhost:3000 health.
      - name: Run integration tests
        working-directory: apps/dashboard
        env:
          NEXT_PUBLIC_SUPABASE_URL: "http://127.0.0.1:54321"
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ steps.supabase-keys.outputs.anon_key }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase-keys.outputs.service_role_key }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "pk_test_placeholder"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
          STRIPE_SECRET_KEY: "sk_test_placeholder"
          STRIPE_WEBHOOK_SECRET: "whsec_placeholder"
          CRON_SECRET: "test-cron-secret"
        run: pnpm exec playwright test --config playwright.integration.config.ts

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: integration-test-results
          path: apps/dashboard/test-results/
          retention-days: 7

      - name: Stop Supabase
        if: always()
        run: supabase stop

  commitlint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate commit messages
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: npx commitlint --from "$BASE_SHA" --to "$HEAD_SHA" --verbose
