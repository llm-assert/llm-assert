name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run rpc-audit

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: "placeholder"
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "pk_test_placeholder"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
        run: pnpm run build

  pkg-exports:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build plugin package
        run: pnpm --filter @llmassert/playwright build
      - name: Validate types (attw)
        run: pnpm --filter @llmassert/playwright exec attw --pack . --profile node16
      - name: Validate exports map (publint)
        run: pnpm --filter @llmassert/playwright exec publint --strict
      - name: Validate runtime imports (ESM + CJS)
        working-directory: packages/playwright
        run: node scripts/check-exports.mjs
      - name: Validate type declarations (tsc)
        run: pnpm --filter @llmassert/playwright exec tsc -p scripts/tsconfig.check-exports.json

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run tests
        env:
          LLMASSERT_API_KEY: ""
          LLMASSERT_INGEST_URL: ""
        run: pnpm test
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: test-results
          path: |
            packages/playwright/test-results/
            apps/dashboard/coverage/
          retention-days: 7

  verify-stripe:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Verify Stripe products and prices
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY_LIVE }}
          STRIPE_STARTER_PRICE_ID: ${{ secrets.STRIPE_STARTER_PRICE_ID }}
          STRIPE_PRO_PRICE_ID: ${{ secrets.STRIPE_PRO_PRICE_ID }}
          STRIPE_TEAM_PRICE_ID: ${{ secrets.STRIPE_TEAM_PRICE_ID }}
        run: pnpm exec tsx scripts/stripe-verify.ts

  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        run: supabase start

      - name: Wait for Supabase health
        run: |
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:54321/rest/v1/ -H "apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0" && break || sleep 2
          done

      - name: Extract Supabase keys
        id: supabase-keys
        run: |
          eval "$(supabase status -o env)"
          echo "anon_key=$ANON_KEY" >> "$GITHUB_OUTPUT"
          echo "service_role_key=$SERVICE_ROLE_KEY" >> "$GITHUB_OUTPUT"

      - name: Build plugin package
        run: pnpm --filter @llmassert/playwright build

      # Next.js is started automatically by Playwright's webServer config
      # (playwright.integration.config.ts) which waits for localhost:3000 health.
      - name: Run integration tests
        working-directory: apps/dashboard
        env:
          NEXT_PUBLIC_SUPABASE_URL: "http://127.0.0.1:54321"
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ steps.supabase-keys.outputs.anon_key }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase-keys.outputs.service_role_key }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "pk_test_placeholder"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
          STRIPE_SECRET_KEY: "sk_test_placeholder"
          STRIPE_WEBHOOK_SECRET: "whsec_placeholder"
          CRON_SECRET: "test-cron-secret"
        run: pnpm exec playwright test --config playwright.integration.config.ts

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: integration-test-results
          path: apps/dashboard/test-results/
          retention-days: 7

      - name: Stop Supabase
        if: always()
        run: supabase stop

  commitlint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate commit messages
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: npx commitlint --from "$BASE_SHA" --to "$HEAD_SHA" --verbose

  # ─── Production Promote (CI-gated) ─────────────────────────────────
  # Promotes the latest preview deployment to production after all CI
  # jobs pass. Only runs on pushes to main or via emergency bypass.
  # See: DX-24 (CI-gated Vercel deployment)
  promote:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, typecheck, build, test, pkg-exports, integration-test, verify-stripe]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Vercel CLI
        run: npm install -g vercel@50.42.0

      - name: Pull Vercel environment
        working-directory: apps/dashboard
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Build project
        working-directory: apps/dashboard
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel build --prod --token "$VERCEL_TOKEN"

      - name: Capture current production deployment
        id: current-prod
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          PROD_URL=$(vercel list --token "$VERCEL_TOKEN" \
            --scope "$VERCEL_ORG_ID" \
            --environment production \
            --json 2>/dev/null \
            | jq -r '.deployments[0].url' \
            | head -1) || true

          if [ -n "$PROD_URL" ] && [ "$PROD_URL" != "null" ]; then
            echo "url=https://$PROD_URL" >> "$GITHUB_OUTPUT"
            echo "Current production: https://$PROD_URL"
          else
            echo "url=" >> "$GITHUB_OUTPUT"
            echo "::warning::Could not capture current production deployment URL"
          fi

      - name: Deploy to production
        id: deploy
        working-directory: apps/dashboard
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN" --archive=tgz)
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

          echo "## Production Deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "**Deployment:** $DEPLOY_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "**Commit:** $GITHUB_SHA" >> "$GITHUB_STEP_SUMMARY"

      - name: Verify deployment health
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
          BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          BYPASS_HEADER=""
          if [ -n "$BYPASS_SECRET" ]; then
            BYPASS_HEADER="-H x-vercel-protection-bypass:${BYPASS_SECRET}"
          fi

          for i in 1 2 3; do
            echo "Health check attempt $i/3..."
            HTTP_CODE=$(curl -s -o /tmp/health-body -w "%{http_code}" --max-time 15 \
              ${BYPASS_HEADER:+$BYPASS_HEADER} \
              "${DEPLOY_URL}/api/health?mode=deep&_t=$(date +%s)" 2>/dev/null) || true
            if [ "$HTTP_CODE" = "200" ]; then
              STATUS=$(cat /tmp/health-body | jq -r '.status' 2>/dev/null)
              if [ "$STATUS" = "healthy" ]; then
                echo "Health check passed: $STATUS"
                exit 0
              fi
              echo "Health status: $STATUS (expected: healthy)"
            fi
            echo "Attempt $i failed (HTTP $HTTP_CODE), retrying in 10s..."
            sleep 10
          done
          echo "::warning::Health check did not pass after 3 attempts — deployment may need investigation"

      - name: Rollback on failure
        if: failure() && steps.current-prod.outputs.url != ''
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          PREVIOUS_URL: ${{ steps.current-prod.outputs.url }}
        run: |
          echo "::warning::Deploy failed — rolling back to $PREVIOUS_URL"
          vercel promote "$PREVIOUS_URL" --token "$VERCEL_TOKEN" --scope "$VERCEL_ORG_ID" --yes --timeout=5m || true
          echo "## Rollback Executed" >> "$GITHUB_STEP_SUMMARY"
          echo "**Restored:** $PREVIOUS_URL" >> "$GITHUB_STEP_SUMMARY"
