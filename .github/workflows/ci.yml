name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run rpc-audit

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: "placeholder"
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "pk_test_placeholder"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
        run: pnpm run build

  pkg-exports:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build plugin package
        run: pnpm --filter @llmassert/playwright build
      - name: Validate types (attw)
        run: pnpm --filter @llmassert/playwright exec attw --pack . --profile node16
      - name: Validate exports map (publint)
        run: pnpm --filter @llmassert/playwright exec publint --strict
      - name: Validate runtime imports (ESM + CJS)
        working-directory: packages/playwright
        run: node scripts/check-exports.mjs
      - name: Validate type declarations (tsc)
        run: pnpm --filter @llmassert/playwright exec tsc -p scripts/tsconfig.check-exports.json

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run tests
        env:
          LLMASSERT_API_KEY: ""
          LLMASSERT_INGEST_URL: ""
        run: pnpm test
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: test-results
          path: |
            packages/playwright/test-results/
            apps/dashboard/coverage/
          retention-days: 7

  verify-stripe:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Verify Stripe products and prices
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY_LIVE }}
          STRIPE_STARTER_PRICE_ID: ${{ secrets.STRIPE_STARTER_PRICE_ID }}
          STRIPE_PRO_PRICE_ID: ${{ secrets.STRIPE_PRO_PRICE_ID }}
          STRIPE_TEAM_PRICE_ID: ${{ secrets.STRIPE_TEAM_PRICE_ID }}
        run: pnpm exec tsx scripts/stripe-verify.ts

  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        run: supabase start

      - name: Wait for Supabase health
        run: |
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:54321/rest/v1/ -H "apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0" && break || sleep 2
          done

      - name: Extract Supabase keys
        id: supabase-keys
        run: |
          eval "$(supabase status -o env)"
          echo "anon_key=$ANON_KEY" >> "$GITHUB_OUTPUT"
          echo "service_role_key=$SERVICE_ROLE_KEY" >> "$GITHUB_OUTPUT"

      - name: Build plugin package
        run: pnpm --filter @llmassert/playwright build

      # Next.js is started automatically by Playwright's webServer config
      # (playwright.integration.config.ts) which waits for localhost:3000 health.
      - name: Run integration tests
        working-directory: apps/dashboard
        env:
          NEXT_PUBLIC_SUPABASE_URL: "http://127.0.0.1:54321"
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ steps.supabase-keys.outputs.anon_key }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase-keys.outputs.service_role_key }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "pk_test_placeholder"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
          STRIPE_SECRET_KEY: "sk_test_placeholder"
          STRIPE_WEBHOOK_SECRET: "whsec_placeholder"
          CRON_SECRET: "test-cron-secret"
        run: pnpm exec playwright test --config playwright.integration.config.ts

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: integration-test-results
          path: apps/dashboard/test-results/
          retention-days: 7

      - name: Stop Supabase
        if: always()
        run: supabase stop

  commitlint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate commit messages
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: npx commitlint --from "$BASE_SHA" --to "$HEAD_SHA" --verbose

  # ─── Production Promote (CI-gated) ─────────────────────────────────
  # Promotes the latest preview deployment to production after all CI
  # jobs pass. Only runs on pushes to main or via emergency bypass.
  # See: DX-24 (CI-gated Vercel deployment)
  promote:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, typecheck, build, test, pkg-exports, integration-test, verify-stripe]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Install Vercel CLI
        run: npm install -g vercel@50.42.0

      - name: Resolve preview deployment URL
        id: resolve
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          echo "Resolving preview deployment for SHA: $GITHUB_SHA"

          DEPLOYMENT_URL=""
          for i in $(seq 1 20); do
            echo "Attempt $i/20..."
            DEPLOYMENT_URL=$(vercel list --token "$VERCEL_TOKEN" \
              --scope "$VERCEL_ORG_ID" \
              --meta gitCommitSha="$GITHUB_SHA" \
              --json 2>/dev/null \
              | jq -r '.deployments[] | select(.state == "READY" and .target != "production") | .url' \
              | head -1) || true

            if [ -n "$DEPLOYMENT_URL" ]; then
              echo "Found deployment: https://$DEPLOYMENT_URL"
              echo "url=https://$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
              break
            fi

            echo "No READY preview found, retrying in 15s..."
            sleep 15
          done

          if [ -z "$DEPLOYMENT_URL" ]; then
            echo "::error::No READY preview deployment found for commit $GITHUB_SHA after 5 minutes"
            echo "Check Vercel Git Integration status and ensure preview builds are enabled."
            exit 1
          fi

      - name: Capture current production deployment
        id: current-prod
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          PROD_URL=$(vercel list --token "$VERCEL_TOKEN" \
            --scope "$VERCEL_ORG_ID" \
            --environment production \
            --json 2>/dev/null \
            | jq -r '.deployments[0].url' \
            | head -1) || true

          if [ -n "$PROD_URL" ] && [ "$PROD_URL" != "null" ]; then
            echo "url=https://$PROD_URL" >> "$GITHUB_OUTPUT"
            echo "Current production: https://$PROD_URL"
          else
            echo "url=" >> "$GITHUB_OUTPUT"
            echo "::warning::Could not capture current production deployment URL"
          fi

      - name: Promote to production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          DEPLOY_URL: ${{ steps.resolve.outputs.url }}
        run: |
          echo "Promoting $DEPLOY_URL to production..."
          vercel promote "$DEPLOY_URL" --token "$VERCEL_TOKEN" --scope "$VERCEL_ORG_ID" --yes

          echo "## Production Promoted" >> "$GITHUB_STEP_SUMMARY"
          echo "**Deployment:** $DEPLOY_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "**Commit:** $GITHUB_SHA" >> "$GITHUB_STEP_SUMMARY"

      - name: Rollback on failure
        if: failure() && steps.current-prod.outputs.url != ''
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          PREVIOUS_URL: ${{ steps.current-prod.outputs.url }}
        run: |
          echo "::warning::Promote failed — rolling back to $PREVIOUS_URL"
          vercel promote "$PREVIOUS_URL" --token "$VERCEL_TOKEN" --scope "$VERCEL_ORG_ID" --yes || true
          echo "## Rollback Executed" >> "$GITHUB_STEP_SUMMARY"
          echo "**Restored:** $PREVIOUS_URL" >> "$GITHUB_STEP_SUMMARY"
